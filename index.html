<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="90-Day Plan">
<title>90-Day Fitness Plan</title>
<style>
:root{--bg:#ffffff;--bg2:#f5f5f5;--bg3:#ececec;--text:#111111;--text2:#555555;--text3:#888888;--border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);--green:#1D9E75;--green-bg:#E1F5EE;--green-text:#0F6E56;--blue-bg:#E6F1FB;--blue-text:#185FA5;--amber-bg:#FAEEDA;--amber-text:#854F0B;--lime-bg:#EAF3DE;--lime-text:#3B6D11;--radius:10px;--radius-sm:7px}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a1a;--bg2:#242424;--bg3:#2e2e2e;--text:#f0f0f0;--text2:#aaaaaa;--text3:#666666;--border:rgba(255,255,255,0.10);--border2:rgba(255,255,255,0.20);--green-bg:#0a3326;--green-text:#5DCAA5;--blue-bg:#0c2440;--blue-text:#85B7EB;--amber-bg:#2e1e00;--amber-text:#EF9F27;--lime-bg:#1a2e08;--lime-text:#97C459}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Arial,sans-serif;background:var(--bg2);color:var(--text);font-size:15px}
.top-bar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:14px 16px 10px;position:sticky;top:0;z-index:100}
.top-bar h1{font-size:19px;font-weight:600;color:var(--text)}
.top-bar p{font-size:12px;color:var(--text3);margin-top:1px}
.progress-section{background:var(--bg);padding:12px 16px;border-bottom:0.5px solid var(--border)}
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px}
.progress-label{font-size:12px;color:var(--text2)}
.progress-pct{font-size:12px;font-weight:600;color:var(--green)}
.progress-track{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden}
.progress-fill{height:6px;border-radius:4px;background:var(--green);transition:width .3s}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.stat{background:var(--bg2);border-radius:var(--radius-sm);padding:9px 10px;text-align:center}
.stat-num{font-size:20px;font-weight:600;color:var(--text);line-height:1}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:3px}
.phase-tabs{display:flex;gap:6px;padding:10px 16px;background:var(--bg);border-bottom:0.5px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.phase-tabs::-webkit-scrollbar{display:none}
.phase-tab{flex-shrink:0;padding:7px 14px;border-radius:20px;border:0.5px solid var(--border2);background:transparent;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap}
.phase-tab.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.week-nav{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2)}
.week-nav-btn{width:34px;height:34px;border-radius:50%;border:0.5px solid var(--border2);background:var(--bg);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.week-nav-btn:disabled{opacity:.3;cursor:default}
.week-info{text-align:center}
.week-title{font-size:15px;font-weight:600;color:var(--text)}
.week-sub{font-size:11px;color:var(--text3);margin-top:1px}
.days-list{padding:10px 12px 110px}
.day-card{background:var(--bg);border-radius:var(--radius);border:0.5px solid var(--border);margin-bottom:8px;overflow:hidden}
.day-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.day-icon{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.icon-done{background:var(--green-bg);color:var(--green-text)}
.icon-hard{background:var(--blue-bg);color:var(--blue-text)}
.icon-light{background:var(--lime-bg);color:var(--lime-text)}
.icon-cardio{background:var(--amber-bg);color:var(--amber-text)}
.icon-rest{background:var(--bg3);color:var(--text3)}
.day-info{flex:1;min-width:0}
.day-name{font-size:14px;font-weight:600;color:var(--text)}
.day-label{font-size:11px;color:var(--text3);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;padding:3px 8px;border-radius:10px;flex-shrink:0;font-weight:500}
.badge-hard{background:var(--blue-bg);color:var(--blue-text)}
.badge-light{background:var(--lime-bg);color:var(--lime-text)}
.badge-cardio{background:var(--amber-bg);color:var(--amber-text)}
.badge-rest{background:var(--bg3);color:var(--text3)}
.complete-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.complete-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.chevron{font-size:12px;color:var(--text3);margin-left:2px;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(90deg)}
.day-body{border-top:0.5px solid var(--border);padding:0 14px 14px}
.section-hdr{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:12px 0 8px}
.ex-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--border)}
.ex-row:last-child{border-bottom:none}
.ex-box{width:22px;height:22px;border-radius:5px;border:1.5px solid var(--border2);background:transparent;flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.ex-box.done{background:var(--green);border-color:var(--green);color:#fff}
.ex-content{flex:1;min-width:0}
.ex-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.35}
.ex-detail{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
.ex-note{font-size:11px;color:var(--green-text);margin-top:3px;font-style:italic;line-height:1.35}
.elbow-warn{background:var(--amber-bg);color:var(--amber-text);font-size:11px;padding:8px 10px;border-radius:var(--radius-sm);margin-top:10px;line-height:1.45}
.rest-msg{font-size:13px;color:var(--text2);padding:14px 0;line-height:1.65}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:0.5px solid var(--border);padding:10px 16px;padding-bottom:max(10px,env(safe-area-inset-bottom));display:flex;gap:8px}
.bottom-btn{flex:1;padding:10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:transparent;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;text-align:center}
.bottom-btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="top-bar">
  <h1>90-Day Fitness Plan</h1>
  <p>Arms + Abs · 45–60 min/day · 6 days/week</p>
</div>
<div class="progress-section">
  <div class="progress-row"><span class="progress-label">Overall progress</span><span class="progress-pct" id="pct-label">0%</span></div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Days done</div></div>
    <div class="stat"><div class="stat-num" id="s-week">0</div><div class="stat-lbl">This week</div></div>
    <div class="stat"><div class="stat-num" id="s-ex">0</div><div class="stat-lbl">Exercises today</div></div>
  </div>
</div>
<div class="phase-tabs" id="phase-tabs">
  <button class="phase-tab active" onclick="setPhase(1)">Phase 1 — Foundation</button>
  <button class="phase-tab" onclick="setPhase(2)">Phase 2 — Build</button>
  <button class="phase-tab" onclick="setPhase(3)">Phase 3 — Shred</button>
</div>
<div class="week-nav">
  <button class="week-nav-btn" id="prev-w" onclick="changeWeek(-1)">&#8249;</button>
  <div class="week-info">
    <div class="week-title" id="wk-title">Week 1 of 4</div>
    <div class="week-sub" id="wk-sub">Foundation</div>
  </div>
  <button class="week-nav-btn" id="next-w" onclick="changeWeek(1)">&#8250;</button>
</div>
<div class="days-list" id="days-list"></div>
<div class="bottom-bar">
  <button class="bottom-btn" onclick="openToday()">📅 Today</button>
  <button class="bottom-btn primary" onclick="markTodayDone()">✓ Done for today</button>
  <button class="bottom-btn" onclick="resetConfirm()">↺ Reset</button>
</div>
<div class="toast" id="toast"></div>
<script>
const PLAN={1:{name:"Foundation",weeks:4,tagline:"Build base strength and prime the core",days:{Mon:{type:"hard",label:"Push + Abs",ex:[{n:"Dumbbell floor press",d:"4×12 — 20–25 lbs",note:"Floor press protects elbow extension range"},{n:"Dumbbell lateral raise",d:"3×15 — 10 lbs"},{n:"Alternating dumbbell curl",d:"4×10 each arm — 20–25 lbs",note:"Full supination, slow 3-sec eccentric"},{n:"Hammer curl",d:"3×12 — 20–25 lbs"},{n:"Push-up",d:"3×max (aim 15–20)"},{n:"Plank",d:"3×45 sec"},{n:"Hollow body hold",d:"3×30 sec"},{n:"Lying leg raise",d:"3×15"},{n:"Bicycle crunch",d:"3×20 each side"}]},Tue:{type:"light",label:"Run + Core",ex:[{n:"Easy run",d:"25–30 min, conversational pace (zone 2)"},{n:"Dead bug",d:"3×10 each side — slow, controlled"},{n:"Reverse crunch",d:"3×15"},{n:"Side plank",d:"2×30 sec each side"},{n:"Plank shoulder tap",d:"3×12 each side"},{n:"Light dumbbell curl",d:"2×15 — 10 lbs, blood flow focus"}]},Wed:{type:"hard",label:"Pull + Abs",ex:[{n:"Bent-over dumbbell row",d:"4×12 — 25 lbs each, neutral grip",note:"Pull to hip, not armpit — minimizes elbow stress"},{n:"Single-arm dumbbell row",d:"3×12 each — 25 lbs"},{n:"Rear delt fly",d:"3×15 — 10–15 lbs"},{n:"Incline dumbbell curl",d:"3×10 — 20 lbs",note:"Supinated, no swinging — great bicep stretch"},{n:"Concentration curl",d:"3×12 — 20–25 lbs"},{n:"V-up",d:"3×12"},{n:"Russian twist",d:"3×20 — holding 10-lb dumbbell"},{n:"Mountain climber",d:"3×30 sec"},{n:"Plank",d:"3×45 sec"}]},Thu:{type:"light",label:"Active Recovery",ex:[{n:"Easy cycling commute",d:"Keep it relaxed — no intervals today"},{n:"Stretching / mobility",d:"15 min — hip flexors, shoulders, thoracic spine"},{n:"Foam roll or massage",d:"Quads, lats, calves — 10 min"},{n:"Optional: light curl",d:"2×15 — 10 lbs, for pump/recovery"}]},Fri:{type:"hard",label:"Arms Focus + Core",ex:[{n:"Dumbbell curl 21s",d:"3 sets — 7 bottom / 7 top / 7 full — 15 lbs",note:"Classic hypertrophy technique"},{n:"Cross-body hammer curl",d:"3×10 each arm — 20–25 lbs"},{n:"Zottman curl",d:"3×10 — 20 lbs",note:"Curl up supinated, lower pronated — trains both heads"},{n:"Dumbbell floor press",d:"3×15 — 20 lbs"},{n:"Lateral raise",d:"3×15 — 10–12 lbs"},{n:"Ab wheel rollout",d:"3×10"},{n:"Corkscrew",d:"3×12 — legs up, rotate hips"},{n:"Plank to downward dog",d:"3×12 reps"},{n:"Side plank hip dip",d:"3×12 each side"}]},Sat:{type:"cardio",label:"Cardio + Pump",ex:[{n:"Moderate run",d:"35–40 min, zone 3 pace"},{n:"Dumbbell curl superset",d:"3 rounds: 15 light (10 lbs) → 8 heavy (25 lbs), 60 sec rest"},{n:"Push-up burn-out",d:"3 sets to failure"},{n:"Core circuit",d:"Plank 45s → leg raise ×15 → bicycle ×20 — 3 rounds, no rest"}]},Sun:{type:"rest",label:"Full Rest",ex:[]}}},2:{name:"Build",weeks:4,tagline:"Progressive overload on arms, intensify abs",days:{Mon:{type:"hard",label:"Push + Abs — heavier",ex:[{n:"Dumbbell floor press",d:"5×10 — 25 lbs"},{n:"Feet-elevated push-up",d:"4×12 — feet on chair"},{n:"Arnold press (seated)",d:"3×12 — 15–20 lbs",note:"Stop just below lockout to protect elbow"},{n:"Lateral raise",d:"4×15 — 15 lbs"},{n:"Dumbbell curl",d:"4×12 — 25 lbs, tempo 2-0-2"},{n:"Hammer curl",d:"4×10 — 25 lbs"},{n:"Hanging / lying leg raise",d:"4×15"},{n:"Weighted crunch",d:"4×20 — hold 10-lb dumbbell at chest"},{n:"Plank",d:"4×60 sec"},{n:"Dragon flag negatives",d:"3×5 slow negatives"}]},Tue:{type:"light",label:"Run Intervals + Core",ex:[{n:"Run intervals",d:"5 min warm-up, 6×2 min hard / 90 sec easy, 5 min cool-down"},{n:"Dead bug",d:"3×12 each side"},{n:"Ab rollout",d:"3×12"},{n:"Side plank with rotation",d:"3×10 each side"},{n:"Pallof press (dumbbell anchor)",d:"3×12 each side"}]},Wed:{type:"hard",label:"Pull + Abs — heavier",ex:[{n:"Bent-over dumbbell row",d:"5×10 — 25 lbs, tempo 2-1-2"},{n:"Chest-supported dumbbell row",d:"4×12 — lean on inclined surface"},{n:"Single-arm row",d:"3×10 heavy, pause at top"},{n:"Incline curl",d:"4×10 — 22–25 lbs"},{n:"Concentration curl",d:"4×12 — 25 lbs"},{n:"Reverse curl",d:"3×15 — 15 lbs",note:"Trains brachialis + forearm — thickens the arm visually"},{n:"V-up",d:"4×15"},{n:"Russian twist (weighted)",d:"4×20 — 15-lb dumbbell"},{n:"Mountain climber",d:"4×45 sec"},{n:"Plank",d:"4×60 sec"}]},Thu:{type:"light",label:"Cycling Intervals + Stretch",ex:[{n:"Cycling intervals",d:"Alternate hard/easy every 3 min for 20 min on your commute"},{n:"Full-body mobility",d:"20 min — pigeon, thoracic rotation, shoulder circles"},{n:"Optional curl burnout",d:"2×20 — 10 lbs, squeeze at top"}]},Fri:{type:"hard",label:"Arms Specialization",ex:[{n:"Dumbbell curl 21s",d:"4 sets — 15–20 lbs"},{n:"Zottman curl",d:"4×10 — 22–25 lbs"},{n:"Cross-body hammer curl",d:"4×12 each — 25 lbs"},{n:"Alternating curl (seated)",d:"3×12 — 25 lbs, no swinging"},{n:"Close-grip floor press",d:"4×12 — 25 lbs, elbows tucked",note:"Stop short of lockout — tricep focus, elbow-friendly"},{n:"One-arm overhead extension",d:"3×12 — 15 lbs",note:"One arm reduces elbow load vs. two-handed version"},{n:"Ab circuit",d:"4 rounds: hollow body 30s → v-up ×12 → bicycle ×20 → plank 45s — 30 sec rest"}]},Sat:{type:"cardio",label:"Long Run + Abs",ex:[{n:"Long run",d:"40–50 min, zone 2–3 steady"},{n:"Ab finisher",d:"5 rounds: leg raise ×15 → Russian twist ×20 → plank 60 sec — 45 sec rest"}]},Sun:{type:"rest",label:"Full Rest",ex:[]}}},3:{name:"Shred",weeks:4,tagline:"High intensity, metabolic conditioning, reveal the abs",days:{Mon:{type:"hard",label:"Push + HIIT Abs",ex:[{n:"Dumbbell floor press",d:"5×8 — 25 lbs, explosive up / 3 sec down"},{n:"Arnold press",d:"4×10 — 20 lbs"},{n:"Renegade row push-up",d:"4×10 each side"},{n:"Lateral raise",d:"4×15 — 15 lbs"},{n:"Dumbbell curl",d:"5×10 — 25 lbs"},{n:"Hammer curl",d:"5×8 — 25 lbs"},{n:"HIIT abs — 4 rounds",d:"Plank 60s → burpee ×10 → bicycle ×30 → leg raise ×15 — 20 sec rest only"}]},Tue:{type:"light",label:"Sprint Intervals",ex:[{n:"Sprint workout",d:"10 min warm-up jog, 8×30 sec all-out / 90 sec walk, 10 min cool-down"},{n:"Core circuit",d:"3×: dead bug ×12 → ab rollout ×10 → hollow body 30s"},{n:"Post-run stretch",d:"10 min"}]},Wed:{type:"hard",label:"Pull + HIIT Abs",ex:[{n:"Dumbbell row",d:"5×8 — 25 lbs, explosive pull"},{n:"Single-arm row",d:"4×10 each — heavy, controlled"},{n:"Rear delt fly",d:"4×15 — 15 lbs"},{n:"Incline curl",d:"4×10 — 25 lbs"},{n:"Zottman curl",d:"4×10 — 25 lbs"},{n:"Reverse curl",d:"4×12 — 15 lbs"},{n:"HIIT abs — 4 rounds",d:"V-up ×15 → Russian twist ×30 → mountain climber 45s → side plank 30s each — 20 sec rest only"}]},Thu:{type:"light",label:"Hard Commute + Mobility",ex:[{n:"Cycling — push the commute",d:"Stand on climbs, sprint at lights — treat it as cardio"},{n:"Foam rolling",d:"15 min full body"},{n:"Mobility",d:"15 min — focus hips and shoulders"}]},Fri:{type:"hard",label:"Arms + Metabolic Core",ex:[{n:"Dumbbell curl 21s",d:"5 sets — 20 lbs"},{n:"Hammer curl",d:"5×8 — 25 lbs"},{n:"Alternating curl (seated, heavy)",d:"4×10 — 25 lbs"},{n:"Close-grip floor press",d:"4×12 — 25 lbs"},{n:"One-arm overhead extension",d:"4×12 — 15–20 lbs"},{n:"Metabolic core circuit — 5 rounds",d:"Plank 60s → bicycle ×30 → leg raise ×20 → v-up ×15 → burpee ×8 — 30 sec rest"}]},Sat:{type:"cardio",label:"Tempo Run — Race Effort",ex:[{n:"Tempo run",d:"45–55 min — push zone 4 for the middle 25 min"},{n:"Ab finisher — 5 rounds",d:"Leg raise ×15 → ab rollout ×12 → Russian twist ×30 → plank 75s — 30 sec rest"}]},Sun:{type:"rest",label:"Full Rest",ex:[]}}}};

const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
let phase=1,week=1,state={},openMap={};

function load(){try{state=JSON.parse(localStorage.getItem('fit90_v2')||'{}');}catch(e){state={};}}
function save(){try{localStorage.setItem('fit90_v2',JSON.stringify(state));}catch(e){}}
function dk(p,w,d){return p+'_'+w+'_'+d;}
function ek(p,w,d,i){return p+'_'+w+'_'+d+'_'+i;}
function totalDone(){let c=0;for(let p=1;p<=3;p++){const ph=PLAN[p];for(let w=1;w<=ph.weeks;w++){DAYS.forEach(d=>{if(state[dk(p,w,d)])c++;});}}return c;}
function weekDone(){let c=0;DAYS.forEach(d=>{if(state[dk(phase,week,d)])c++;});return c;}
function todayDay(){const d=new Date().getDay();return DAYS[d===0?6:d-1];}
function todayExDone(){const t=todayDay();const ex=PLAN[phase].days[t]?.ex||[];let c=0;ex.forEach((_,i)=>{if(state[ek(phase,week,t,i)])c++;});return c;}

function updateStats(){
  const td=totalDone(),pct=Math.round(td/90*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('pct-label').textContent=pct+'%';
  document.getElementById('s-total').textContent=td;
  document.getElementById('s-week').textContent=weekDone();
  document.getElementById('s-ex').textContent=todayExDone();
}
function setPhase(p){phase=p;week=1;document.querySelectorAll('.phase-tab').forEach((b,i)=>b.classList.toggle('active',i+1===p));render();}
function changeWeek(d){const max=PLAN[phase].weeks;week=Math.max(1,Math.min(max,week+d));render();}
function toggleDay(p,w,d){const k=dk(p,w,d);state[k]=!state[k];if(state[k])toast('Day marked complete ✓');save();render();}
function toggleEx(p,w,d,i){const k=ek(p,w,d,i);state[k]=!state[k];const el=document.getElementById(k);if(el){el.className='ex-box'+(state[k]?' done':'');el.textContent=state[k]?'✓':'';}save();updateStats();}
function toggleOpen(key){openMap[key]=!openMap[key];renderDays();}

function typeIcon(type,done){if(done)return{cls:'icon-done',txt:'✓'};const m={hard:{cls:'icon-hard',txt:'💪'},light:{cls:'icon-light',txt:'🏃'},cardio:{cls:'icon-cardio',txt:'🚴'},rest:{cls:'icon-rest',txt:'😴'}};return m[type]||{cls:'icon-rest',txt:'·'};}
function typeBadge(type){return{hard:'<span class="badge badge-hard">Strength</span>',light:'<span class="badge badge-light">Light</span>',cardio:'<span class="badge badge-cardio">Cardio</span>',rest:'<span class="badge badge-rest">Rest</span>'}[type]||'';}

function renderDays(){
  const ph=PLAN[phase];let html='';
  DAYS.forEach(day=>{
    const d=ph.days[day],key=dk(phase,week,day),done=!!state[key],open=!!openMap[key];
    const{cls,txt}=typeIcon(d.type,done);
    html+='<div class="day-card"><div class="day-header" onclick="toggleOpen(\''+key+'\')"><div class="day-icon '+cls+'">'+txt+'</div><div class="day-info"><div class="day-name">'+day+'</div><div class="day-label">'+d.label+'</div></div>'+typeBadge(d.type)+'<div class="complete-btn'+(done?' done':'')+'" onclick="event.stopPropagation();toggleDay('+phase+','+week+',\''+day+'\')">'+(done?'✓':'')+'</div><span class="chevron'+(open?' open':'')+'">&#8250;</span></div>';
    if(open){
      html+='<div class="day-body">';
      if(d.type==='rest'){
        html+='<p class="rest-msg">Full rest day. Let your muscles repair and grow.<br><br>Hydrate well, aim for 8 hours of sleep, and hit 150g+ protein. Light walking is fine. No structured training today — this is when the gains actually happen.</p>';
      } else {
        html+='<div class="section-hdr">Week '+week+' &middot; Phase '+phase+' &mdash; '+ph.name+'</div>';
        d.ex.forEach((ex,ei)=>{
          const k=ek(phase,week,day,ei),exd=!!state[k];
          html+='<div class="ex-row"><div class="ex-box'+(exd?' done':'')+'" id="'+k+'" onclick="toggleEx('+phase+','+week+',\''+day+'\','+ei+')">'+(exd?'✓':'')+'</div><div class="ex-content"><div class="ex-name">'+ex.n+'</div><div class="ex-detail">'+ex.d+'</div>'+(ex.note?'<div class="ex-note">&#8627; '+ex.note+'</div>':'')+'</div></div>';
        });
        if(d.type==='hard') html+='<div class="elbow-warn">&#9888; Elbow reminder: keep a soft bend under load. Avoid full extension. Skip anything painful — add a curl set instead.</div>';
      }
      html+='</div>';
    }
    html+='</div>';
  });
  document.getElementById('days-list').innerHTML=html;
}

function render(){
  const ph=PLAN[phase];
  document.getElementById('wk-title').textContent='Week '+week+' of '+ph.weeks;
  document.getElementById('wk-sub').textContent=ph.name+' &middot; '+ph.tagline;
  document.getElementById('prev-w').disabled=week<=1;
  document.getElementById('next-w').disabled=week>=ph.weeks;
  const today=todayDay();
  if(!openMap[dk(phase,week,today)]) openMap={[dk(phase,week,today)]:true};
  renderDays();updateStats();
}
function openToday(){
  const today=todayDay();openMap={[dk(phase,week,today)]:true};renderDays();
  setTimeout(()=>{const cards=document.querySelectorAll('.day-card');const idx=DAYS.indexOf(today);if(cards[idx])cards[idx].scrollIntoView({behavior:'smooth',block:'start'});},50);
}
function markTodayDone(){const today=todayDay(),k=dk(phase,week,today);if(!state[k]){state[k]=true;save();render();toast('Day marked complete ✓');}else{toast('Already marked complete!');}}
function resetConfirm(){if(confirm('Reset ALL progress? This cannot be undone.')){state={};save();render();toast('Progress reset');}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

load();render();
</script>
